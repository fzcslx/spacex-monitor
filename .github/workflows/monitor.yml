name: SpaceX product monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STORE_URL: "https://shop.spacex.com"
          KEYWORDS: "asteroid,doge,plush,plushie"
          NOTIFY_ALL_NEW: "false"
        run: python monitor.py

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain alerted_products.json)" ]]; then
            git config user.name "monitor-bot"
            git config user.email "monitor-bot@users.noreply.github.com"
            git add alerted_products.json
            git commit -m "Update seen products [skip ci]"
            git push
          fi
